name: Build Android App

on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y imagemagick wget

      - name: Inject Configuration & Assets
        run: |
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${{ github.event.client_payload.app_name }}</string>|" app/src/main/res/values/strings.xml
          
          sed -i "s|applicationId \"com.appbuilder.template\"|applicationId \"${{ github.event.client_payload.package_name }}\"|" app/build.gradle
          
          sed -i "s|https://google.com|${{ github.event.client_payload.app_url }}|" app/src/main/java/com/appbuilder/template/MainActivity.java
          
          sed -i "s|#6200EE|${{ github.event.client_payload.primary_color }}|g" app/src/main/res/values/colors.xml
          
          sed -i "s|CUSTOM_UA_PLACEHOLDER|${{ github.event.client_payload.user_agent }}|" app/src/main/java/com/appbuilder/template/MainActivity.java
          
          if [ "${{ github.event.client_payload.show_toolbar }}" == "true" ]; then
             sed -i 's|false; // FLAG_TOOLBAR_PLACEHOLDER|true;|' app/src/main/java/com/appbuilder/template/MainActivity.java
          fi

          SPLASH_COLOR="${{ github.event.client_payload.splash_color }}"
          sed -i "s|<color name=\"splash_bg\">.*</color>|<color name=\"splash_bg\">$SPLASH_COLOR</color>|" app/src/main/res/values/colors.xml

          ICON_URL="${{ github.event.client_payload.icon_url }}"
          if [ ! -z "$ICON_URL" ] && [ "$ICON_URL" != "null" ]; then
            wget -O custom_icon.png "$ICON_URL"
            mkdir -p app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi
            convert custom_icon.png -resize 48x48 app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert custom_icon.png -resize 72x72 app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert custom_icon.png -resize 96x96 app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert custom_icon.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert custom_icon.png -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            cp app/src/main/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher_round.png
            cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png
            cp app/src/main/res/mipmap-xhdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
            cp app/src/main/res/mipmap-xxhdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
            cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          fi

          SPLASH_URL="${{ github.event.client_payload.splash_url }}"
          mkdir -p app/src/main/res/drawable
          if [ ! -z "$SPLASH_URL" ] && [ "$SPLASH_URL" != "null" ]; then
            wget -O splash_custom.png "$SPLASH_URL"
            convert splash_custom.png -resize "800x800>" app/src/main/res/drawable/splash_logo.png
          else
            if [ -f "app/src/main/res/mipmap-xxxhdpi/ic_launcher.png" ]; then
                cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/drawable/splash_logo.png
            else
                convert -size 800x800 xc:transparent app/src/main/res/drawable/splash_logo.png
            fi
          fi

      - name: Clean Invalid Resource Files
        run: |
          find app/src/main/res -type f ! -name "*.xml" ! -name "*.png" ! -name "*.webp" -delete

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: App successfully generated for ${{ github.event.client_payload.app_name }}
          files: app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
