name: Build Android App
on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout the base template code
      - name: Checkout Source Code
        uses: actions/checkout@v3

      # 2. Setup Java Environment (Required for Gradle)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Inject Configuration & Custom Assets
      - name: Inject Configuration & Assets
        run: |
          echo "---------------------------------------------------"
          echo "Starting Injection Process for: ${{ github.event.client_payload.app_name }}"
          echo "Package ID: ${{ github.event.client_payload.package_name }}"
          echo "Target URL: ${{ github.event.client_payload.app_url }}"
          echo "Primary Color: ${{ github.event.client_payload.primary_color }}"
          echo "Toolbar Enabled: ${{ github.event.client_payload.show_toolbar }}"
          echo "---------------------------------------------------"

          # --- TEXT REPLACEMENTS ---

          # 1. Inject App Name (strings.xml)
          # Replaces <string name="app_name">AppBuilder Template</string>
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">${{ github.event.client_payload.app_name }}<\/string>/' app/src/main/res/values/strings.xml
          
          # 2. Inject Package Name / Application ID (build.gradle)
          # Replaces: applicationId "com.appbuilder.template"
          sed -i 's/applicationId "com.appbuilder.template"/applicationId "${{ github.event.client_payload.package_name }}"/' app/build.gradle
          
          # 3. Inject URL (MainActivity.java)
          # Replaces: private static final String TARGET_URL = "https://google.com";
          # We use | as delimiter because URLs contain slashes
          sed -i 's|https://google.com|${{ github.event.client_payload.app_url }}|' app/src/main/java/com/appbuilder/template/MainActivity.java
          
          # 4. Inject Color (colors.xml)
          # Replaces the default purple color with user color
          sed -i 's/#6200EE/${{ github.event.client_payload.primary_color }}/' app/src/main/res/values/colors.xml

          # 5. User Agent Suffix (MainActivity.java)
          # Replaces: private static final String USER_AGENT_SUFFIX = "CUSTOM_UA_PLACEHOLDER";
          sed -i 's|CUSTOM_UA_PLACEHOLDER|${{ github.event.client_payload.user_agent }}|' app/src/main/java/com/appbuilder/template/MainActivity.java
          
          # 6. Toolbar Toggle (MainActivity.java)
          # Checks if the payload is "true". If so, replaces the false flag in Java.
          if [ "${{ github.event.client_payload.show_toolbar }}" == "true" ]; then
             echo "Enabling Toolbar..."
             sed -i 's/false; \/\/ FLAG_TOOLBAR_PLACEHOLDER/true;/' app/src/main/java/com/appbuilder/template/MainActivity.java
          else
             echo "Toolbar Disabled (Default)"
          fi

          # --- ICON PROCESSING ---
          
          ICON_URL="${{ github.event.client_payload.icon_url }}"
          
          if [ ! -z "$ICON_URL" ] && [ "$ICON_URL" != "null" ]; then
            echo "Downloading Custom Icon from $ICON_URL..."
            
            # Download the icon
            wget -O custom_icon.png "$ICON_URL"
            
            # Install ImageMagick to resize images
            sudo apt-get update && sudo apt-get install -y imagemagick

            echo "Generating Android Icons..."
            
            # Resize and overwrite default icons in all density folders
            convert custom_icon.png -resize 48x48 app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert custom_icon.png -resize 72x72 app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert custom_icon.png -resize 96x96 app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert custom_icon.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert custom_icon.png -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            
            # Also update round icons if they exist
            cp app/src/main/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher_round.png
            cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png
            cp app/src/main/res/mipmap-xhdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
            cp app/src/main/res/mipmap-xxhdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
            cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

            echo "Icons Updated Successfully."
          else
            echo "No custom icon provided, using default Android icon."
          fi

      # 4. Grant Execute Permission
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Build the APK (Release Mode)
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 6. Publish the APK to GitHub Releases
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: App Build #${{ github.run_number }} (${{ github.event.client_payload.app_name }})
          body: |
            **App Name:** ${{ github.event.client_payload.app_name }}
            **Package:** ${{ github.event.client_payload.package_name }}
            **Target URL:** ${{ github.event.client_payload.app_url }}
            **Built at:** ${{ github.event.repository.updated_at }}
          files: app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
